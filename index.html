<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>UNIP - LabManager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #003366;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(to right, #f8f9fa, white);
            border-radius: 15px;
            border-bottom: 3px solid #003366;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #003366;
        }

        .logo-text {
            font-size: 14px;
            font-weight: bold;
            color: #003366;
            text-align: center;
            line-height: 1.3;
            padding: 8px;
        }

        .title-section {
            text-align: center;
        }

        .title-section h1 {
            color: #003366;
            font-size: 1.6rem;
        }

        .unip-badge {
            background: #003366;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 5px;
        }

        .sync-status {
            background: #28a745;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
            color: white;
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 1.3rem;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 15px;
            border-top: 4px solid #003366;
        }

        .form-section h2 {
            color: #003366;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #003366;
        }

        textarea {
            min-height: 80px;
        }

        .btn {
            background: #003366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        .btn:active {
            background: #0066cc;
            transform: scale(0.98);
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }

        .items-section {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 2px dashed #003366;
        }

        .item-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .item-row input {
            flex: 2;
            min-width: 120px;
        }

        .item-row input[type="number"] {
            flex: 1;
            min-width: 80px;
        }

        .item-row select {
            flex: 0.8;
            min-width: 70px;
        }

        .item-row button {
            flex: 0.5;
            min-width: 44px;
            height: 44px;
            padding: 0;
            font-size: 1.2rem;
        }

        .item-list {
            list-style: none;
            margin-top: 15px;
        }

        .item-list li {
            background: #f1f3f5;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #003366;
        }

        .remove-item {
            color: #dc3545;
            font-size: 22px;
            cursor: pointer;
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .requests-container {
            margin-top: 20px;
        }

        .request-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #003366;
        }

        .request-header {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .request-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #003366;
        }

        .request-date {
            color: #666;
            font-size: 0.8rem;
        }

        .purchase-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .purchase-list h4 {
            color: #003366;
            margin-bottom: 10px;
        }

        .purchase-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #cce5ff;
            color: #004085;
        }

        .request-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .request-actions button {
            flex: 1;
            min-width: 100px;
            padding: 10px;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            padding: 15px;
            color: #666;
            border-top: 1px solid #e0e0e0;
            font-size: 0.8rem;
        }

        @media (max-width: 380px) {
            .item-row {
                flex-direction: column;
            }
            
            .request-actions {
                flex-direction: column;
            }
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                text-align: left;
            }
            
            .title-section {
                text-align: left;
            }
            
            .dashboard {
                flex-direction: row;
            }
            
            .search-bar {
                flex-direction: row;
            }
            
            .request-header {
                flex-direction: row;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="logo-text">
                    UNIVERSIDADE<br>PAULISTA
                </div>
            </div>
            <div class="title-section">
                <h1>🏥 LabManager</h1>
                <div class="unip-badge">UNIP</div>
            </div>
        </div>

        <div id="statusMessage" class="sync-status" style="background: #28a745;">
            ✅ Funcionando 100%
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalRequests">0</h3>
                <p>Solicitações</p>
            </div>
            <div class="stat-card">
                <h3 id="pendingRequests">0</h3>
                <p>Pendentes</p>
            </div>
            <div class="stat-card">
                <h3 id="totalItems">0</h3>
                <p>Itens</p>
            </div>
        </div>

        <div class="dashboard">
            <div class="form-section">
                <h2>📋 Nova Aula</h2>
                <div class="form-group">
                    <label>Professor:</label>
                    <input type="text" id="professor" placeholder="Nome do professor">
                </div>
                <div class="form-group">
                    <label>Curso:</label>
                    <input type="text" id="course" placeholder="Nome do curso">
                </div>
                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="classDate">
                </div>
                <div class="form-group">
                    <label>Horário:</label>
                    <input type="time" id="classTime">
                </div>
                <div class="form-group">
                    <label>Observações:</label>
                    <textarea id="observations" placeholder="Observações..."></textarea>
                </div>
            </div>

            <div class="form-section">
                <h2>🛒 Itens</h2>
                <div class="items-section">
                    <div class="item-row">
                        <input type="text" id="itemName" placeholder="Item">
                        <input type="number" id="itemQuantity" placeholder="Qtd" min="1" value="1">
                        <select id="itemUnit">
                            <option value="un">Un</option>
                            <option value="cx">Cx</option>
                            <option value="lt">L</option>
                            <option value="ml">mL</option>
                            <option value="g">g</option>
                            <option value="kg">kg</option>
                        </select>
                        <button class="btn btn-success" onclick="addItem()">+</button>
                    </div>
                    <ul class="item-list" id="itemList"></ul>
                    <button class="btn" onclick="submitRequest()">📤 Enviar</button>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Buscar...">
            <select id="filterStatus">
                <option value="all">Todos</option>
                <option value="pending">Pendentes</option>
                <option value="approved">Aprovadas</option>
                <option value="completed">Concluídas</option>
            </select>
            <button class="btn" onclick="filterRequests()">Filtrar</button>
        </div>

        <div class="requests-container" id="requestsContainer"></div>

        <div class="footer">
            <p>UNIVERSIDADE PAULISTA - Laboratórios de Saúde</p>
        </div>
    </div>

    <script>
        // 📝 USE ESTA VERSÃO - FUNCIONA SEM INTERNET!
        
        let requests = [];
        let currentItems = [];

        // Carregar dados salvos
        function carregarDados() {
            const saved = localStorage.getItem('labmanager_dados');
            if (saved) {
                requests = JSON.parse(saved);
                atualizarTela();
            }
            atualizarStatus('✅ Dados carregados do celular');
        }

        // Salvar dados
        function salvarDados() {
            localStorage.setItem('labmanager_dados', JSON.stringify(requests));
            atualizarTela();
        }

        // Atualizar mensagem de status
        function atualizarStatus(msg) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = msg;
            statusEl.style.background = '#28a745';
        }

        function addItem() {
            const name = document.getElementById('itemName').value;
            const qtd = document.getElementById('itemQuantity').value;
            const unit = document.getElementById('itemUnit').value;

            if (name && qtd) {
                currentItems.push({ name, quantity: qtd, unit });
                atualizarListaItens();
                document.getElementById('itemName').value = '';
                document.getElementById('itemQuantity').value = '1';
            } else {
                alert('Preencha o nome do item!');
            }
        }

        function atualizarListaItens() {
            const list = document.getElementById('itemList');
            list.innerHTML = '';
            currentItems.forEach((item, i) => {
                list.innerHTML += `<li>
                    <span>${item.name} - ${item.quantity} ${item.unit}</span>
                    <span class="remove-item" onclick="removerItem(${i})">×</span>
                </li>`;
            });
        }

        function removerItem(i) {
            currentItems.splice(i, 1);
            atualizarListaItens();
        }

        function submitRequest() {
            const professor = document.getElementById('professor').value;
            const course = document.getElementById('course').value;
            const date = document.getElementById('classDate').value;
            const time = document.getElementById('classTime').value;
            const obs = document.getElementById('observations').value;

            if (!professor || !course || !date || !time) {
                alert('Preencha todos os campos!');
                return;
            }

            if (currentItems.length === 0) {
                alert('Adicione pelo menos um item!');
                return;
            }

            const request = {
                id: Date.now(),
                professor,
                course,
                classDate: date,
                classTime: time,
                observations: obs,
                items: [...currentItems],
                status: 'pending',
                createdAt: new Date().toLocaleDateString('pt-BR')
            };

            requests.unshift(request);
            salvarDados();
            limparFormulario();
            atualizarStatus('✅ Solicitação salva com sucesso!');
        }

        function limparFormulario() {
            document.getElementById('professor').value = '';
            document.getElementById('course').value = '';
            document.getElementById('classDate').value = '';
            document.getElementById('classTime').value = '';
            document.getElementById('observations').value = '';
            currentItems = [];
            atualizarListaItens();
        }

        function atualizarTela() {
            // Atualizar estatísticas
            document.getElementById('totalRequests').textContent = requests.length;
            document.getElementById('pendingRequests').textContent = 
                requests.filter(r => r.status === 'pending').length;
            document.getElementById('totalItems').textContent = 
                requests.reduce((acc, r) => acc + r.items.length, 0);
            
            mostrarSolicitacoes();
        }

        function mostrarSolicitacoes() {
            const container = document.getElementById('requestsContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterStatus').value;

            let filtered = requests;

            if (filter !== 'all') {
                filtered = filtered.filter(r => r.status === filter);
            }

            if (search) {
                filtered = filtered.filter(r => 
                    r.professor.toLowerCase().includes(search) ||
                    r.course.toLowerCase().includes(search)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:20px;">Nenhuma solicitação encontrada</p>';
                return;
            }

            container.innerHTML = filtered.map(r => `
                <div class="request-card">
                    <div class="request-header">
                        <span class="request-title">${r.course}</span>
                        <span class="request-date">${r.createdAt}</span>
                    </div>
                    <div class="request-details">
                        <div>
                            <p><strong>👨‍🏫</strong> ${r.professor}</p>
                            <p><strong>📅</strong> ${formatarData(r.classDate)} às ${r.classTime}</p>
                            ${r.observations ? `<p><strong>📝</strong> ${r.observations}</p>` : ''}
                        </div>
                        <div class="purchase-list">
                            <h4>🛒 Itens (${r.items.length})</h4>
                            ${r.items.map(i => `
                                <div class="purchase-item">
                                    <span>${i.name}</span>
                                    <span>${i.quantity} ${i.unit}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:15px;">
                        <span class="status-badge status-${r.status}">
                            ${r.status === 'pending' ? 'Pendente' : r.status === 'approved' ? 'Aprovado' : 'Concluído'}
                        </span>
                        <div class="request-actions">
                            ${r.status === 'pending' ? `
                                <button class="btn btn-success" onclick="atualizarStatus(${r.id}, 'approved')">✓ Aprovar</button>
                            ` : ''}
                            ${r.status === 'approved' ? `
                                <button class="btn btn-success" onclick="atualizarStatus(${r.id}, 'completed')">✓ Concluir</button>
                            ` : ''}
                            <button class="btn btn-danger" onclick="excluir(${r.id})">🗑 Excluir</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatarData(d) {
            return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR');
        }

        function atualizarStatus(id, novoStatus) {
            const req = requests.find(r => r.id === id);
            if (req) {
                req.status = novoStatus;
                salvarDados();
                atualizarStatus('✅ Status atualizado!');
            }
        }

        function excluir(id) {
            if (confirm('Tem certeza que deseja excluir?')) {
                requests = requests.filter(r => r.id !== id);
                salvarDados();
                atualizarStatus('✅ Excluído com sucesso!');
            }
        }

        function filterRequests() {
            mostrarSolicitacoes();
        }

        // Configurar eventos
        document.getElementById('searchInput').addEventListener('input', filterRequests);
        document.getElementById('filterStatus').addEventListener('change', filterRequests);
        
        // Data mínima = hoje
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('classDate').min = today;

        // Iniciar
        carregarDados();
    </script>
</body>
</html>
